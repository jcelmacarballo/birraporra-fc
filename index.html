<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BirraFOrra FC">
  <meta name="description" content="La porra dels teus colegues - La aplicació de porres de futbol">
  <meta name="theme-color" content="#0a0907">
  
  <title>BIRRAPORRA FC 🍺⚽</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Changa+One&display=swap" rel="stylesheet">
  
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    :root {
      --pff: "Space Mono", monospace;
      --bg: #0a0907;
      --txt: #f5eed8;
      --gold: #f5b800;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      overscroll-behavior: none;
    }
    
    body {
      position: fixed;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    
    #root {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
    }
    
    /* Animaciones */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    /* Scrollbar personalizada */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #16110a;
    }
    ::-webkit-scrollbar-thumb {
      background: #2e2618;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3a3020;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.js"></script>
</body>
</html>
